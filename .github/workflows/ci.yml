name: CI — Build, Test, and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  PYTHON_VERSION: '3.12'
  REGISTRY: docker.io/enterpriseai

jobs:
  # ── Java Backend ──────────────────────────────────────────
  java-build:
    name: Java — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn -f backend-java/pom.xml verify -B -ntp

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: backend-java/**/target/surefire-reports/

  # ── Python Agent Runtime ──────────────────────────────────
  python-build:
    name: Python — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: agent-python/pyproject.toml

      - name: Install dependencies
        run: |
          cd agent-python
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd agent-python
          python -m pytest tests/ -v --junitxml=junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: agent-python/junit.xml

  # ── Frontend ──────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint || true

      - name: Build
        run: |
          cd frontend
          npm run build || true

  # ── Security Scan ─────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [java-build, python-build]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ── Docker Build & Push ───────────────────────────────────
  docker-build:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [java-build, python-build, frontend-build]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - gateway-service
          - auth-service
          - agent-service
          - model-service
          - rag-service
          - tool-service
          - skill-service
          - memory-service
          - trace-service
          - billing-service
          - admin-service
          - audit-service
          - agent-runtime
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }},${{ env.REGISTRY }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging ─────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install enterprise-ai ./deploy/helm/enterprise-ai-platform \
            --namespace enterprise-ai-staging --create-namespace \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageRegistry=${{ env.REGISTRY }} \
            --set gateway.ingress.host=staging.enterprise-ai.local \
            --wait --timeout 10m

      - name: Smoke test
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/part-of=enterprise-ai-platform \
            -n enterprise-ai-staging --timeout=300s
          curl -f http://staging.enterprise-ai.local/health || echo "Ingress may not be ready"

  # ── Deploy to Production (manual approval) ────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config

      - name: Deploy with Helm (canary)
        run: |
          helm upgrade --install enterprise-ai ./deploy/helm/enterprise-ai-platform \
            --namespace enterprise-ai-production --create-namespace \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageRegistry=${{ env.REGISTRY }} \
            --set gateway.ingress.host=api.enterprise-ai.com \
            --set canary.enabled=true \
            --set canary.weight=10 \
            --wait --timeout 15m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment -n enterprise-ai-production --timeout=600s
