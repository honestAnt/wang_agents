# Observability profile — OpenTelemetry + Jaeger OTLP
# Activate with: spring.profiles.active=observability

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: trace-service
      auto-offset-reset: earliest

# OpenTelemetry (auto-instrumented via Java Agent)
otel:
  service:
    name: trace-service
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  traces:
    sampler: always_on

# Jaeger OTLP gRPC
jaeger:
  endpoint: ${JAEGER_ENDPOINT:http://localhost:4317}
  service-name: ${JAEGER_SERVICE_NAME:trace-service}

# Grafana alert rules (JSON)
grafana:
  alerts:
    - name: high_token_usage
      condition: token_usage > 1000000
      channel: slack
    - name: high_error_rate
      condition: error_rate > 0.05
      channel: email
    - name: tool_failure_spike
      condition: tool_failure_count > 10
      channel: webhook
