server:
  port: 8080

spring:
  application:
    name: gateway-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/realms/enterprise-ai-platform}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8080/realms/enterprise-ai-platform/protocol/openid-connect/certs}
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/tenants/**,/api/users/**,/api/departments/**
        - id: model-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/models/**,/api/quotas/**,/api/api-keys/**
        - id: rag-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/knowledge-bases/**
        - id: tool-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/tools/**
        - id: skill-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/skills/**
        - id: agent-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/agents/**
        - id: trace-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/trace/**
        - id: agent-runtime
          uri: http://localhost:8000
          predicates:
            - Path=/api/v1/chat/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

# Jaeger OTLP tracing
jaeger:
  endpoint: ${JAEGER_ENDPOINT:http://localhost:4317}
  service-name: gateway-service
