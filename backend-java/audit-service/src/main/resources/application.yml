server:
  port: 8091

spring:
  application:
    name: audit-service
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:wang_agent}
    username: ${POSTGRES_USER:wang_agent}
    password: ${POSTGRES_PASSWORD:wang_agent}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
