server:
  port: 9090

spring:
  application:
    name: agent-application
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/realms/wang-agent}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8080/realms/wang-agent/protocol/openid-connect/certs}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/wang_agent}
    username: ${POSTGRES_USER:wang_agent}
    password: ${POSTGRES_PASSWORD:wang_agent}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

jaeger:
  endpoint: ${JAEGER_ENDPOINT:http://localhost:4317}
  service-name: agent-application
