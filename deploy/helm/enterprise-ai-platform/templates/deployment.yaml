{{- define "enterprise-ai.deployment" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/part-of: enterprise-ai-platform
spec:
  replicas: {{ .values.replicaCount | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/part-of: enterprise-ai-platform
    spec:
      containers:
        - name: {{ .name }}
          image: "{{ $.Values.global.imageRegistry }}/{{ .values.image | default .name }}:{{ .values.tag | default $.Values.global.imageTag | default "latest" }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .port | default 8080 }}
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseZGC -XX:MaxRAMPercentage=75.0"
          {{- if .values.resources }}
          resources:
            {{- toYaml .values.resources | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .port | default 8080 }}
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .port | default 8080 }}
            initialDelaySeconds: 10
            periodSeconds: 5
{{- end }}
