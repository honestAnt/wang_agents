openapi: "3.1.0"
info:
  title: Enterprise AI Platform — Agent Management API
  version: "1.0.0"
  description: Agent CRUD, configuration, versioning, and debugging.

servers:
  - url: /api/v1

security:
  - bearerAuth: []

paths:
  /agents:
    get:
      summary: List agents (tenant-scoped)
      operationId: listAgents
      tags: [Agents]
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [draft, test, published, archived] }
        - name: search
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Paginated agent list.

    post:
      summary: Create a new agent
      operationId: createAgent
      tags: [Agents]
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCreate"

  /agents/{agent_id}:
    get:
      summary: Get agent detail
      operationId: getAgent
      tags: [Agents]
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema: { type: string }
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Agent detail.

    put:
      summary: Update agent
      operationId: updateAgent
      tags: [Agents]
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema: { type: string }
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"

    delete:
      summary: Delete agent
      operationId: deleteAgent
      tags: [Agents]
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema: { type: string }
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted.

  /agents/{agent_id}/debug:
    post:
      summary: Debug agent with a test message (returns full trace)
      operationId: debugAgent
      tags: [Agents]
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema: { type: string }
        - name: agent_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string }
      responses:
        "200":
          description: Debug result with full trace.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AgentCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        description: { type: string, maxLength: 1024 }
        avatar_url: { type: string, format: uri }
        system_prompt: { type: string }
        model_id: { type: string }
        temperature: { type: number, minimum: 0, maximum: 2 }
        max_tokens: { type: integer }
        tool_ids: { type: array, items: { type: string } }
        skill_ids: { type: array, items: { type: string } }
        kb_ids: { type: array, items: { type: string } }
        memory_strategy: { type: string, enum: [short_term, long_term, both, none] }
        visibility: { type: string, enum: [private, tenant, public] }
        allowed_roles: { type: array, items: { type: string } }

    AgentUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        description: { type: string }
        system_prompt: { type: string }
        model_id: { type: string }
        temperature: { type: number }
        max_tokens: { type: integer }
        tool_ids: { type: array, items: { type: string } }
        skill_ids: { type: array, items: { type: string } }
        kb_ids: { type: array, items: { type: string } }
        memory_strategy: { type: string, enum: [short_term, long_term, both, none] }
