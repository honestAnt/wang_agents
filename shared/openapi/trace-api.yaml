openapi: "3.1.0"
info:
  title: Enterprise AI Platform — Trace API
  version: "1.0.0"
  description: Trace & audit service — span ingestion, session query, cost analytics.

servers:
  - url: /api/v1

security:
  - bearerAuth: []

paths:
  /trace/spans:
    post:
      summary: Ingest spans (batch)
      operationId: ingestSpans
      tags: [Trace]
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                spans:
                  type: array
                  items:
                    $ref: "../../trace-model/trace_schema.json"

  /trace/sessions:
    get:
      summary: List trace sessions
      operationId: listSessions
      tags: [Trace]
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema: { type: string }
        - name: user_id
          in: query
          schema: { type: string }
        - name: agent_id
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [ok, error, timeout] }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Paginated session list.

  /trace/sessions/{session_id}:
    get:
      summary: Get session detail with full span tree
      operationId: getSessionDetail
      tags: [Trace]
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema: { type: string }
        - name: session_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Full session trace detail.

  /trace/costs:
    get:
      summary: Token cost analytics
      operationId: getCostAnalytics
      tags: [Trace]
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema: { type: string }
        - name: group_by
          in: query
          schema: { type: string, enum: [user, agent, model, day] }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Cost breakdown.
